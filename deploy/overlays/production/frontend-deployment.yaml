apiVersion: apps/v1
kind: Deployment
metadata:
  name: bistrot-tatina-front
  namespace: bistrot-tatina
  labels:
    app: bistrot-tatina-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bistrot-tatina-front
  template:
    metadata:
      labels:
        app: bistrot-tatina-front
    spec:
      containers:
        - name: front
          image: bistrot_tatina_front_image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: bistrot-tatina-front
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
