apiVersion: apps/v1
kind: Deployment
metadata:
  name: bistrot-tatina-api
  namespace: bistrot-tatina
  labels:
    app: bistrot-tatina-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bistrot-tatina-api
  template:
    metadata:
      labels:
        app: bistrot-tatina-api
    spec:
      containers:
        - name: api
          image: bistrot_tatina_api_image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: bistrot-tatina-api
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bistrot-tatina-api-data
