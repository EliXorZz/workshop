apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bistrot-tatina

resources:
  - namespace.yaml
  - configmap.yaml
  - api-pvc.yaml
  - api-deployment.yaml
  - api-service.yaml
  - api-ingress.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - frontend-ingress.yaml

images:
  - name: bistrot_tatina_front_image
    newName: "harbor.server.dylanbattig.fr/private/bistrot_tatina_front" # {"$imagepolicy": "flux-system:bistrot-tatina-front:name"}
    newTag: "main-latest" # {"$imagepolicy": "flux-system:bistrot-tatina-front:tag"}
  - name: bistrot_tatina_api_image
    newName: "harbor.server.dylanbattig.fr/private/bistrot_tatina_api" # {"$imagepolicy": "flux-system:bistrot-tatina-api:name"}
    newTag: "main-latest" # {"$imagepolicy": "flux-system:bistrot-tatina-api:tag"}

generatorOptions:
  disableNameSuffixHash: true
